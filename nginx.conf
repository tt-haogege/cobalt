server {
    listen 80;
    server_name _;

    root /app/web;
    index index.html;

    # mime.types 本身是完整的 types { }，不能再包一层；单独 include
    include /etc/nginx/mime.types;

    client_max_body_size 100M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 256;

    location /session {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tunnel {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        # 页面启用了 COEP；部分环境下隧道响应需要显式 CORP，否则 Worker 里 fetch 会失败且 Node 无日志
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # 必须放在 location / 之前：否则「Accept 含 application/json」会把子资源误转发到 Node API，
    # /_libav/*.wasm.mjs 会 400，FFmpeg Worker 无法启动（表现为「无法启动处理工作线程」）
    location ^~ /_libav/ {
        root /app/web;
        # 仅对本目录覆盖 MIME（Alpine 默认 mime.types 常无 .mjs）
        types {
            application/javascript mjs js;
            application/wasm wasm;
        }
        default_type application/octet-stream;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location ^~ /_app/ {
        root /app/web;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 418 = @cobalt_api;
        if ($http_accept ~* application/json) {
            return 418;
        }
        if ($request_method = POST) {
            return 418;
        }

        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        try_files $uri $uri/index.html /404.html;
    }

    location @cobalt_api {
        internal;
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
